name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            asset_suffix: darwin_amd64
          - runner: macos-14
            asset_suffix: darwin_arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          version="${VERSION#v}"
          test "$version" = "$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')"
          cargo build --release --locked
          mkdir -p dist
          archive="digg_${version}_${{ matrix.asset_suffix }}.tar.gz"
          mkdir -p stage
          cp target/release/digg docs/digg.1 stage/
          cp -R completions stage/
          tar -C stage -czf "dist/$archive" digg digg.1 completions
          shasum -a 256 "dist/$archive" > "dist/$archive.sha256"
      - uses: actions/upload-artifact@v7
        with:
          name: digg-${{ matrix.asset_suffix }}-archive
          path: dist/*.tar.gz
          if-no-files-found: error
      - uses: actions/upload-artifact@v7
        with:
          name: digg-${{ matrix.asset_suffix }}-checksum
          path: dist/*.sha256
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: digg-*
          merge-multiple: true
      - name: Verify release prerequisites
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          test -n "$HOMEBREW_TAP_TOKEN" || {
            echo "HOMEBREW_TAP_TOKEN must have Contents read/write access to dantech2000/homebrew-tap." >&2
            exit 1
          }
          test -f release-assets/digg_${GITHUB_REF_NAME#v}_darwin_amd64.tar.gz
          test -f release-assets/digg_${GITHUB_REF_NAME#v}_darwin_arm64.tar.gz
      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # release-please creates the GitHub Release when its release PR is
          # merged, so this tag-triggered job must upload assets to the existing
          # release rather than trying to create a duplicate. Fall back to
          # creating the release for tags pushed without release-please.
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" release-assets/* --generate-notes
          fi
      - name: Update Homebrew Cask
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          version="${VERSION#v}"
          intel_sha="$(awk '{print $1}' "release-assets/digg_${version}_darwin_amd64.tar.gz.sha256")"
          arm_sha="$(awk '{print $1}' "release-assets/digg_${version}_darwin_arm64.tar.gz.sha256")"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/dantech2000/homebrew-tap.git" homebrew-tap
          ./scripts/update-homebrew-cask.sh homebrew-tap "$version" "$intel_sha" "$arm_sha"
          git -C homebrew-tap config user.name "github-actions[bot]"
          git -C homebrew-tap config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C homebrew-tap add Casks/digg.rb
          git -C homebrew-tap commit -m "chore: update digg cask to ${version}"
          git -C homebrew-tap push
